<!DOCTYPE html>
<html>

<head>

  <title>Company Payment</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{

      background:#f5f7fb;

      padding:40px;

      position:relative;

    }

    .logout-btn{

      position:absolute;

      top:20px;

      right:20px;

      background:#C62828;

      color:white;

      border:none;

      padding:10px 18px;

      border-radius:8px;

      cursor:pointer;

      font-size:14px;

    }

    .logout-btn:hover{

      background:#8E0000;

    }

    .box{

      width:420px;

      margin:auto;

      background:white;

      padding:30px;

      border-radius:15px;

      box-shadow:0 0 15px rgba(0,0,0,0.1);

    }

    .title{

      text-align:center;

      font-size:28px;

      font-weight:bold;

      color:#1565C0;

    }

    .company{

      text-align:center;

      margin-top:8px;

      color:#555;

      font-size:15px;

    }

    input{

      width:100%;

      padding:14px;

      margin-top:15px;

      border:1px solid #ccc;

      border-radius:8px;

      font-size:15px;

    }

    button{

      width:100%;

      padding:14px;

      margin-top:20px;

      border:none;

      border-radius:8px;

      background:#1565C0;

      color:white;

      font-size:16px;

      cursor:pointer;

    }

    button:hover{

      background:#0D47A1;

    }

    .message{

      margin-top:15px;

      text-align:center;

      font-weight:bold;

      color:green;

    }

  </style>

</head>

<body>

<button class="logout-btn" onclick="logout()">
Logout
</button>

<div class="box">

  <div class="title">
    Company Payment Entry
  </div>

  <div class="company">

    Company:
    <span id="companyName"></span>

  </div>

  <input
    type="number"
    id="amount"
    placeholder="Enter Amount"
  >

  <input
    type="text"
    id="transactionNo"
    placeholder="Transaction Number"
  >

  <input
    type="date"
    id="date"
  >

  <input
    type="text"
    id="notes"
    placeholder="Notes"
  >

  <button onclick="savePayment()">
    Submit Payment
  </button>

  <div id="message" class="message"></div>

</div>

<script>

if(!localStorage.getItem("role")){

  window.location.href =
  "login.html";

}

document.getElementById("companyName")
.innerHTML =
localStorage.getItem("company");

const API =
"https://script.google.com/macros/s/AKfycbzDyq0QBwIuHAn8RF8RwlYHhTQUx22_uS3dkGlBHZ4om8VE8G11EDgTuZeoV2IxUWycZQ/exec";

function savePayment(){

  fetch(API,{

    method:"POST",

    body:JSON.stringify({

      type:"companyPayment",

      date:
      document.getElementById("date").value,

      company:
      localStorage.getItem("company"),

      transactionNo:
      document.getElementById("transactionNo").value,

      amount:
      document.getElementById("amount").value,

      notes:
      document.getElementById("notes").value

    })

  })

  .then(res=>res.text())

  .then(data=>{

    document.getElementById("message")
    .innerHTML =
    "✅ Payment Saved Successfully";

    document.getElementById("amount").value="";
    document.getElementById("transactionNo").value="";
    document.getElementById("date").value="";
    document.getElementById("notes").value="";

  });

}

function logout(){

  localStorage.clear();

  alert("Logged Out Successfully");

  window.location.href =
  "login.html";

}

</script>

</body>
</html>
